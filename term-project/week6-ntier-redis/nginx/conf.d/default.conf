# ==============================================================
# Nginx Load Balancer Configuration (Improved for Availability)
# ENGSE207 Term Project Week 6 — Part 6
#
# Goals:
# - Re-resolve DNS for service "app" when instances change
# - Retry/failover automatically when some instances are down
# ==============================================================

# Docker embedded DNS in containers
resolver 127.0.0.11 valid=5s ipv6=off;

upstream app_servers {
    # Shared state for dynamic upstream DNS updates
    zone app_servers 64k;

    # Enable runtime DNS re-resolution for service name "app"
    server app:3000 resolve
        max_fails=1 fail_timeout=3s;

    keepalive 32;
}

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://app_servers;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Retry/failover on upstream errors/timeouts
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;

        # Faster failure detection
        proxy_connect_timeout 1s;
        proxy_read_timeout 10s;

        add_header X-Served-By $upstream_addr always;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

        if ($request_method = 'OPTIONS') { return 204; }
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
